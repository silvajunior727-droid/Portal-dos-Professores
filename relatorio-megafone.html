<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatório do Megafone - Gestão</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .header {
            background-color: #2c3e50;
            color: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            margin: 0;
            font-size: 24px;
        }
        .btn-voltar {
            background-color: #e74c3c;
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
            transition: 0.2s;
        }
        .btn-voltar:hover {
            background-color: #c0392b;
        }
        .btn-limpar {
            background-color: #e67e22;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
        }
        .btn-limpar:hover {
            background-color: #d35400;
        }
        /* Estilos da Tabela */
        .tabela-container {
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        th {
            background-color: #856404;
            color: white;
            text-align: left;
            padding: 15px;
            border: 1px solid #dee2e6;
        }
        td {
            padding: 12px 15px;
            border: 1px solid #dee2e6;
            transition: 0.2s;
        }
        tr:hover td {
            background-color: #fff3cd;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>📊 Relatório de Leituras do Megafone</h1>
        <div style="display: flex; gap: 10px;">
            <button class="btn-limpar" onclick="limparHistoricoFirebase()">🧹 Limpar Histórico</button>
            <a href="index.html" class="btn-voltar">⬅️ Voltar ao Portal</a>
        </div>
    </div>

    <div class="tabela-container">
        <p style="color: #666; margin-top: 0;">Acompanhe aqui os professores que já confirmaram a leitura dos avisos centrais.</p>
        
        <table>
            <thead>
                <tr>
                    <th>Professor / Usuário</th>
                    <th>E-mail</th>
                    <th>Aviso Lido</th>
                    <th>Data e Hora da Leitura</th>
                </tr>
            </thead>
            <tbody id="tabela-historico-body">
                <tr>
                    <td colspan="4" style="text-align: center; padding: 20px; color: #666;">
                        <em>Carregando histórico do Firebase...⏳</em>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
        // =========================================================================
        // ⚠️ ATENÇÃO, JÚNIOR: COLE A SUA CONFIGURAÇÃO DO FIREBASE AQUI ABAIXO!
        // =========================================================================
  const firebaseConfig = {
    apiKey: "AIzaSyBEwojx6crH5h1hZN0FUcO2bmumzHdcdL8",
    authDomain: "portal-gp-e702f.firebaseapp.com",
    projectId: "portal-gp-e702f",
    storageBucket: "portal-gp-e702f.firebasestorage.app",        
    messagingSenderId: "1037077869578",
    appId: "1:1037077869578:web:d3d1a691cf341fe9321bf3"
        };

        // =========================================================================

        // Inicializa o Firebase nesta página separada
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();

        // Quando a página carregar, busca os dados
        document.addEventListener('DOMContentLoaded', () => {
            carregarHistoricoMegafone();
        });

        // 📊 FUNÇÃO QUE MONTA A TABELA
        function carregarHistoricoMegafone() {
            const tbody = document.getElementById('tabela-historico-body');
            
            // Puxa os dados da coleção, do mais recente para o mais antigo
            db.collection('historico_avisos').orderBy('dataDaLeitura', 'desc').onSnapshot((querySnapshot) => {
                tbody.innerHTML = ''; // Limpa a tabela

                if (querySnapshot.empty) {
                    tbody.innerHTML = '<tr><td colspan="4" style="text-align: center; padding: 20px; color: #666;">Nenhuma leitura registrada ainda.</td></tr>';
                    return;
                }

                querySnapshot.forEach((doc) => {
                    const dados = doc.data();
                    
                    // Formata a data para o padrão Brasileiro
                    let dataFormatada = "Data indisponível";
                    if (dados.dataDaLeitura) {
                        const dataJs = dados.dataDaLeitura.toDate();
                        dataFormatada = dataJs.toLocaleString('pt-BR'); 
                    }

                    // Cria a linha HTML
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td><strong>${dados.nome || 'Sem Nome'}</strong></td>
                        <td>${dados.email || 'Sem E-mail'}</td>
                        <td style="max-width: 250px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;" title="${dados.avisoLido}">
                            ${dados.avisoLido}
                        </td>
                        <td>${dataFormatada}</td>
                    `;
                    tbody.appendChild(tr);
                });
            }, (erro) => {
                console.error("Erro ao buscar histórico: ", erro);
                tbody.innerHTML = `
                    <tr>
                        <td colspan="4" style="text-align: center; color: red; padding: 20px;">
                            <strong>Erro ao carregar os dados!</strong><br>
                            Se for a primeira vez que roda, abra o Console (F12) e clique no link azul para criar o Índice do Firebase.
                        </td>
                    </tr>`;
            });
        }

        // 🧹 FUNÇÃO PARA LIMPAR O HISTÓRICO (BÔNUS!)
        function limparHistoricoFirebase() {
            if(confirm("⚠️ ATENÇÃO: Tem certeza que deseja apagar TODO o histórico de leituras? Isso não pode ser desfeito!")) {
                db.collection('historico_avisos').get().then((querySnapshot) => {
                    // O Firebase precisa apagar documento por documento
                    const batch = db.batch();
                    querySnapshot.forEach((doc) => {
                        batch.delete(doc.ref);
                    });
                    return batch.commit();
                }).then(() => {
                    alert("✅ Histórico de leituras limpo com sucesso!");
                }).catch((erro) => {
                    alert("Erro ao limpar histórico: " + erro.message);
                });
            }
        }
    </script>
</body>
</html>
